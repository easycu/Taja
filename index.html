<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>속기 마스터 Pro - 맞춤형 연습</title>
    <style>
        body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background-color: #f4f7f9; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; color: #333; }
        nav { margin-bottom: 25px; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        nav button { padding: 12px 20px; cursor: pointer; border: none; border-radius: 8px; background-color: #4a90e2; color: white; font-weight: bold; transition: 0.3s; }
        nav button:hover { background-color: #357abd; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 90%; max-width: 900px; text-align: center; min-height: 400px; }
        .hidden { display: none; }
        input[type="text"], textarea { width: 90%; padding: 15px; font-size: 18px; margin-top: 15px; border: 2px solid #e1e4e8; border-radius: 10px; outline: none; }
        input[type="text"]:focus, textarea:focus { border-color: #4a90e2; }
        .stat { margin-top: 20px; font-size: 16px; font-weight: bold; color: #555; }
        
        /* 목록 관리 */
        .list-section { display: flex; gap: 20px; margin-top: 20px; text-align: left; }
        .list-box { flex: 1; border: 1px solid #eee; border-radius: 10px; padding: 15px; height: 300px; overflow-y: auto; background: #fff; }
        ul { list-style: none; padding: 0; margin: 0; }
        li { padding: 10px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
        li:hover { background-color: #fcfcfc; }
        li button { background: #ff5e5e; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }

        /* 텍스트 선택창 */
        .select-box { padding: 10px; width: 100%; font-size: 16px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #ccc; }

        /* 연습 화면 전용 스타일 */
        .target-box { font-size: 22px; line-height: 1.6; background: #f8f9fa; padding: 20px; border-radius: 10px; margin-bottom: 20px; text-align: left; min-height: 80px; border-left: 5px solid #4a90e2; word-break: keep-all; }

        /* 게임 화면 */
        #game-canvas { width: 100%; height: 400px; background-color: #1a1a1a; position: relative; overflow: hidden; border-radius: 15px; margin-bottom: 15px; }
        .falling-word { position: absolute; color: #00d1ff; font-weight: bold; font-size: 18px; white-space: nowrap; text-shadow: 0 0 5px rgba(0,209,255,0.5); }
    </style>
</head>
<body>

    <h1>⌨️ 속기 연습 마스터 Pro</h1>

    <nav>
        <button onclick="showMode('abbreviation')">약어 연습</button>
        <button onclick="showMode('shorttext')">짧은 글 연습</button>
        <button onclick="showMode('longtext')">긴 글 연습</button>
        <button onclick="showMode('game')">산성비 게임</button>
        <button onclick="showMode('manage')">데이터 관리</button>
    </nav>

    <div id="abbreviation-mode" class="container">
        <h2>약어 집중 연습</h2>
        <div id="abbr-target" style="font-size: 40px; font-weight: bold; color: #4a90e2; margin-bottom: 30px;">단어를 등록해 주세요.</div>
        <input type="text" id="abbr-input" placeholder="입력 후 엔터" onkeypress="handleAbbrInput(event)">
        <div class="stat">방금 정확도: <span id="abbr-acc">-</span>%</div>
    </div>

    <div id="shorttext-mode" class="container hidden">
        <h2>짧은 글 랜덤 연습</h2>
        <p>저장된 긴 글에서 마침표(.) 단위로 분리된 문장이 무작위로 출제됩니다.</p>
        <div id="short-target" class="target-box">텍스트 파일을 먼저 등록하세요.</div>
        <input type="text" id="short-input" placeholder="문장을 따라 치고 엔터를 누르세요" onkeypress="handleShortInput(event)">
        <div class="stat">정확도(띄어쓰기 제외): <span id="short-acc">0</span>%</div>
        <button onclick="setNextShortText()" style="margin-top:20px; background:#6c757d; color:white; border:none; padding:10px 20px; border-radius:5px; cursor:pointer; font-weight:bold;">다음 문장 넘어가기</button>
    </div>

    <div id="longtext-mode" class="container hidden">
        <h2>긴 글 실전 연습</h2>
        <select id="long-text-select" class="select-box" onchange="loadSelectedLongText()">
            <option value="">연습할 글을 선택하세요</option>
        </select>
        <div id="long-target" class="target-box" style="white-space: pre-wrap; max-height: 250px; overflow-y: auto;">글을 선택하면 여기에 표시됩니다.</div>
        <textarea id="long-input" rows="5" placeholder="위 내용을 따라 입력하세요..." oninput="checkLongText()"></textarea>
        <div class="stat">진행도: <span id="long-progress">0</span>% | 정확도: <span id="long-acc">0</span>%</div>
    </div>

    <div id="game-mode" class="container hidden">
        <h2>산성비 약어 게임</h2>
        <div id="game-canvas"></div>
        <input type="text" id="game-input" placeholder="단어를 입력하세요" onkeypress="handleGameInput(event)">
        <div class="stat">점수: <span id="game-score">0</span> | 목숨: <span id="game-life">5</span></div>
        <button onclick="startGame()" style="margin-top:10px; padding:10px 30px; background:#28a745; color:white; border:none; border-radius:5px; cursor:pointer; font-weight:bold;">게임 시작</button>
    </div>

    <div id="manage-mode" class="container hidden">
        <h2>데이터 관리 센터</h2>
        <div class="list-section">
            <div class="list-box">
                <h3 style="margin-top:0;">약어/단어 목록</h3>
                <div style="display:flex; margin-bottom:10px;">
                    <input type="text" id="new-word" placeholder="새 단어 입력" style="margin-top:0; width:70%; font-size: 14px; border-radius:5px 0 0 5px;">
                    <button onclick="addWord()" style="width:30%; border:none; background:#4a90e2; color:white; border-radius:0 5px 5px 0; cursor:pointer;">추가</button>
                </div>
                <ul id="word-list"></ul>
            </div>
            <div class="list-box">
                <h3 style="margin-top:0;">긴 글 저장 목록 (.txt)</h3>
                <input type="file" id="file-upload" accept=".txt" style="font-size: 14px; margin-bottom: 10px; width:100%;" onchange="handleFileUpload(event)">
                <ul id="long-text-list"></ul>
            </div>
        </div>
    </div>

    <script>
        let words = JSON.parse(localStorage.getItem('stenoWords')) || ["대한민국", "경제성장", "민주주의"];
        let longTexts = JSON.parse(localStorage.getItem('stenoLongTexts')) || [];
        
        let currentMode = 'abbreviation';
        let currentAbbr = "";
        let currentShortSentence = "";
        let gameActive = false;

        function showMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
            document.getElementById(mode + '-mode').classList.remove('hidden');
            gameActive = false;
            
            if(mode === 'manage') renderAllLists();
            if(mode === 'abbreviation') { setNextAbbr(); setTimeout(()=>document.getElementById('abbr-input').focus(), 100); }
            if(mode === 'shorttext') { setNextShortText(); setTimeout(()=>document.getElementById('short-input').focus(), 100); }
            if(mode === 'longtext') updateLongTextSelect();
        }

        // 텍스트 정제 (속기 규칙 적용)
        function convertStenoText(text) {
            let res = text;
            // 1. 단일 알파벳 대문자 한글 변환
            const alpha = { 'A':'에이', 'B':'비', 'C':'씨', 'D':'디', 'E':'이', 'F':'에프', 'G':'지', 'H':'에이치', 'I':'아이', 'J':'제이', 'K':'케이', 'L':'엘', 'M':'엠', 'N':'엔', 'O':'오', 'P':'피', 'Q':'큐', 'R':'알', 'S':'에스', 'T':'티', 'U':'유', 'V':'브이', 'W':'더블유', 'X':'엑스', 'Y':'와이', 'Z':'제트' };
            res = res.replace(/\b[A-Z]\b/g, m => alpha[m] || m);
            
            // 2. 계산 기호 한글 변환
            res = res.replace(/\+/g, ' 더하기 ').replace(/-/g, ' 빼기 ').replace(/\*/g, ' 곱하기 ').replace(/\//g, ' 나누기 ').replace(/=/g, ' 는 ');
            return res;
        }

        function renderAllLists() {
            const wList = document.getElementById('word-list');
            wList.innerHTML = '';
            words.forEach((w, i) => {
                wList.innerHTML += `<li>${w} <button onclick="deleteWord(${i})">삭제</button></li>`;
            });
            localStorage.setItem('stenoWords', JSON.stringify(words));

            const lList = document.getElementById('long-text-list');
            lList.innerHTML = '';
            longTexts.forEach((t, i) => {
                lList.innerHTML += `<li><span style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:70%;">${t.title}</span> <button onclick="deleteLongText(${i})">삭제</button></li>`;
            });
            localStorage.setItem('stenoLongTexts', JSON.stringify(longTexts));
        }

        function addWord() {
            const val = document.getElementById('new-word').value.trim();
            if(val) { words.push(val); document.getElementById('new-word').value = ''; renderAllLists(); }
        }
        function deleteWord(i) { words.splice(i, 1); renderAllLists(); }

        function handleFileUpload(e) {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                // 속기 규칙이 적용된 텍스트
                const convertedText = convertStenoText(ev.target.result);
                
                // 마침표(.)를 기준으로 분리하되 마침표 보존
                let rawChunks = convertedText.split('.');
                let sentenceArray = [];
                for(let i = 0; i < rawChunks.length - 1; i++) {
                    let s = rawChunks[i].trim();
                    if(s.length > 0) sentenceArray.push(s + '.');
                }
                let lastPart = rawChunks[rawChunks.length - 1].trim();
                if(lastPart.length > 0) sentenceArray.push(lastPart);

                longTexts.push({ 
                    title: file.name, 
                    content: convertedText, 
                    sentences: sentenceArray // 짧은 글용 문장 배열 완벽 저장
                });
                renderAllLists();
                alert(`"${file.name}" 파일이 성공적으로 분리 및 저장되었습니다!`);
                e.target.value = ''; // 초기화
            };
            reader.readAsText(file);
        }
        function deleteLongText(i) { longTexts.splice(i, 1); renderAllLists(); }

        // 공통: 띄어쓰기 제거
        function clean(text) { return text.replace(/\s/g, ''); }

        // 1. 약어 연습
        function setNextAbbr() {
            if(words.length === 0) return;
            currentAbbr = words[Math.floor(Math.random() * words.length)];
            document.getElementById('abbr-target').innerText = currentAbbr;
        }
        function handleAbbrInput(e) {
            if(e.key === 'Enter') {
                const input = document.getElementById('abbr-input');
                const acc = clean(input.value) === clean(currentAbbr) ? 100 : 0;
                document.getElementById('abbr-acc').innerText = acc;
                input.value = '';
                setNextAbbr();
            }
        }

        // 2. 짧은 글 연습
        function setNextShortText() {
            let allSentences = [];
            longTexts.forEach(t => {
                if(t.sentences) allSentences = allSentences.concat(t.sentences);
            });
            
            if(allSentences.length === 0) {
                document.getElementById('short-target').innerText = "데이터 관리 탭에서 텍스트 파일을 먼저 등록해주세요.";
                return;
            }
            
            currentShortSentence = allSentences[Math.floor(Math.random() * allSentences.length)];
            document.getElementById('short-target').innerText = currentShortSentence;
            document.getElementById('short-input').value = '';
            document.getElementById('short-acc').innerText = '0';
            document.getElementById('short-input').focus();
        }
        
        function handleShortInput(e) {
            if(e.key === 'Enter') {
                const input = document.getElementById('short-input');
                const userVal = clean(input.value);
                const targetVal = clean(currentShortSentence);
                
                let matchCount = 0;
                for(let i=0; i<Math.min(userVal.length, targetVal.length); i++) {
                    if(userVal[i] === targetVal[i]) matchCount++;
                }
                const acc = targetVal.length > 0 ? Math.round((matchCount / targetVal.length) * 100) : 0;
                document.getElementById('short-acc').innerText = acc;
                
                setTimeout(() => setNextShortText(), 300);
            }
        }

        // 3. 긴 글 연습
        function updateLongTextSelect() {
            const select = document.getElementById('long-text-select');
            select.innerHTML = '<option value="">연습할 글을 선택하세요</option>';
            longTexts.forEach((t, i) => {
                select.innerHTML += `<option value="${i}">${t.title}</option>`;
            });
            document.getElementById('long-target').innerText = '글을 선택하면 여기에 표시됩니다.';
            document.getElementById('long-input').value = '';
        }
        function loadSelectedLongText() {
            const idx = document.getElementById('long-text-select').value;
            if(idx !== "") {
                document.getElementById('long-target').innerText = longTexts[idx].content;
                document.getElementById('long-input').value = '';
                document.getElementById('long-input').focus();
            }
        }
        function checkLongText() {
            const target = document.getElementById('long-target').innerText;
            const user = document.getElementById('long-input').value;
            const cleanTarget = clean(target);
            const cleanUser = clean(user);
            
            const progress = Math.min(100, Math.round((cleanUser.length / cleanTarget.length) * 100));
            document.getElementById('long-progress').innerText = progress || 0;
            
            let matches = 0;
            for(let i=0; i<cleanUser.length; i++) {
                if(cleanUser[i] === cleanTarget[i]) matches++;
            }
            const acc = cleanUser.length > 0 ? Math.round((matches / cleanUser.length) * 100) : 0;
            document.getElementById('long-acc').innerText = acc;
        }

        // 4. 산성비 게임
        let score = 0, life = 5, falling = [], gameInt;
        function startGame() {
            if(words.length === 0) return alert("데이터 관리 탭에서 단어를 먼저 추가하세요!");
            score = 0; life = 5; falling = []; gameActive = true;
            document.getElementById('game-canvas').innerHTML = '';
            document.getElementById('game-score').innerText = 0;
            document.getElementById('game-life').innerText = 5;
            document.getElementById('game-input').focus();
            clearInterval(gameInt);
            gameInt = setInterval(createWord, 2000);
            updateGame();
        }
        function createWord() {
            if(!gameActive) return;
            const txt = words[Math.floor(Math.random() * words.length)];
            const el = document.createElement('div');
            el.className = 'falling-word';
            el.innerText = txt;
            el.style.left = (Math.random() * 80 + 5) + '%';
            el.style.top = '0px';
            document.getElementById('game-canvas').appendChild(el);
            falling.push({ el: el, top: 0, txt: clean(txt) });
        }
        function updateGame() {
            if(!gameActive) return;
            falling.forEach((w, i) => {
                w.top += 1.5;
                w.el.style.top = w.top + 'px';
                if(w.top > 370) {
                    w.el.remove();
                    falling.splice(i, 1);
                    life--;
                    document.getElementById('game-life').innerText = life;
                    if(life <= 0) { gameActive = false; alert("게임 종료! 최종 점수: " + score); }
                }
            });
            if(gameActive) requestAnimationFrame(updateGame);
        }
        function handleGameInput(e) {
            if(e.key === 'Enter') {
                const input = document.getElementById('game-input');
                const val = clean(input.value);
                const idx = falling.findIndex(w => w.txt === val);
                if(idx > -1) {
                    falling[idx].el.remove();
                    falling.splice(idx, 1);
                    score += 10;
                    document.getElementById('game-score').innerText = score;
                }
                input.value = '';
            }
        }

        showMode('abbreviation');
    </script>
</body>
</html>
